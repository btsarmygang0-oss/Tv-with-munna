<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TV with Munna</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@700;900&display=swap');

:root {
  --bg:       #07090f;
  --surface:  #0d1117;
  --card:     #111827;
  --border:   #1f2937;
  --accent:   #f97316;
  --accent2:  #fb923c;
  --blue:     #3b82f6;
  --green:    #22c55e;
  --red:      #ef4444;
  --text:     #f1f5f9;
  --muted:    #64748b;
  --sub:      #94a3b8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══ HEADER ═══ */
header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(7,9,15,0.96);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: 1px;
  white-space: nowrap;
  flex-shrink: 0;
}
.logo .tv  { color: var(--accent); }
.logo .dot { color: var(--muted); margin: 0 4px; }
.logo .mn  { color: var(--text); }

.live-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--red);
  flex-shrink: 0;
}
.live-dot {
  width: 7px; height: 7px;
  background: var(--red);
  border-radius: 50%;
  animation: blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.search-wrap {
  flex: 1;
  max-width: 340px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px 8px 36px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 0.9rem;
  pointer-events: none;
}

/* ═══ LAYOUT ═══ */
.layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: calc(100vh - 60px);
}

/* ═══ SIDEBAR ═══ */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px);
  padding-bottom: 24px;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); }

.sidebar-section { margin-top: 8px; }
.sidebar-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 14px 18px 6px;
}

.divider { height: 1px; background: var(--border); margin: 8px 0; }

.sb-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 18px;
  background: none;
  border: none;
  border-left: 3px solid transparent;
  color: var(--sub);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  text-align: left;
  transition: all .15s;
}
.sb-btn:hover { background: rgba(249,115,22,.06); color: var(--text); }
.sb-btn.active {
  background: rgba(249,115,22,.1);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}
.sb-icon { font-size: 1.1rem; width: 22px; text-align: center; flex-shrink: 0; }
.sb-count {
  margin-left: auto;
  font-size: 0.7rem;
  background: var(--card);
  color: var(--muted);
  padding: 1px 7px;
  border-radius: 10px;
}

/* ═══ MAIN ═══ */
.main { padding: 20px 24px; }

/* ═══ PLAYER ═══ */
.player-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 28px;
}

.player-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 10px;
}

.now-info { display: flex; align-items: center; gap: 10px; }
.live-tag {
  background: var(--red);
  color: #fff;
  font-size: 0.6rem;
  font-weight: 800;
  letter-spacing: 1.2px;
  padding: 3px 8px;
  border-radius: 4px;
  animation: blink 1.4s infinite;
}
.now-name { font-weight: 700; font-size: 0.95rem; }
.now-sub  { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

.player-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.p-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--sub);
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 0.78rem;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all .15s;
}
.p-btn:hover { border-color: var(--accent); color: var(--accent); }

/* quality selector */
.quality-wrap {
  position: relative;
}
.quality-menu {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  z-index: 300;
  min-width: 130px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
}
.quality-menu.open { display: block; }
.q-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  font-size: 0.82rem;
  color: var(--sub);
  cursor: pointer;
  transition: background .12s;
  gap: 12px;
}
.q-item:hover { background: rgba(249,115,22,.08); color: var(--text); }
.q-item.active { color: var(--accent); font-weight: 600; }
.q-item .q-badge {
  font-size: 0.65rem;
  background: rgba(249,115,22,.15);
  color: var(--accent);
  padding: 1px 6px;
  border-radius: 4px;
}
.q-divider { height: 1px; background: var(--border); }

.video-area {
  position: relative;
  background: #000;
  aspect-ratio: 16/9;
  max-height: 440px;
}
#player {
  width: 100%;
  height: 100%;
  display: block;
  background: #000;
  max-height: 440px;
  object-fit: contain;
}

/* placeholder */
.placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: radial-gradient(ellipse at center, #111827 0%, #07090f 100%);
}
.ph-tv {
  font-size: 5rem;
  opacity: 0.15;
  filter: grayscale(1);
}
.ph-title {
  font-family: 'Orbitron', monospace;
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 2px;
}
.ph-sub { font-size: 0.85rem; color: var(--muted); text-align: center; line-height: 1.6; }

/* error overlay */
.err-overlay {
  position: absolute;
  inset: 0;
  background: rgba(7,9,15,.93);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.err-overlay.show { display: flex; }
.err-icon { font-size: 2.5rem; }
.err-text { color: var(--muted); font-size: 0.88rem; text-align: center; line-height: 1.5; }
.err-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
.err-btn {
  padding: 8px 20px;
  border-radius: 7px;
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.err-btn.primary { background: var(--accent); color: #000; }
.err-btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

/* ═══ FILTER TABS ═══ */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 10px;
}
.section-title { font-size: 1rem; font-weight: 700; }
.ch-count { font-size: 0.8rem; color: var(--muted); }

/* ═══ CHANNEL GRID ═══ */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 12px;
}

.ch-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 14px;
  cursor: pointer;
  transition: border-color .18s, transform .15s, box-shadow .18s;
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.ch-card:hover {
  border-color: rgba(249,115,22,.4);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.ch-card.playing {
  border-color: var(--accent);
  background: rgba(249,115,22,.07);
  box-shadow: 0 0 0 1px var(--accent);
}

.ch-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.ch-flag { font-size: 1.5rem; line-height: 1; }
.ch-live-dot {
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  animation: blink 2s infinite;
}
.ch-name {
  font-size: 0.83rem;
  font-weight: 600;
  line-height: 1.35;
  color: var(--text);
}
.ch-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.ch-tag {
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: .3px;
}
.tag-news    { background: rgba(59,130,246,.15); color: #60a5fa; }
.tag-sports  { background: rgba(34,197,94,.15);  color: #4ade80; }
.tag-ent     { background: rgba(168,85,247,.15);  color: #c084fc; }
.tag-kids    { background: rgba(251,191,36,.15);  color: #fbbf24; }
.tag-sci     { background: rgba(20,184,166,.15);  color: #2dd4bf; }
.tag-music   { background: rgba(244,63,94,.15);   color: #fb7185; }
.tag-general { background: rgba(100,116,139,.15); color: #94a3b8; }
.tag-weather { background: rgba(14,165,233,.15);  color: #38bdf8; }
.tag-relig   { background: rgba(234,179,8,.15);   color: #eab308; }

.watch-btn {
  width: 100%;
  padding: 7px;
  background: rgba(249,115,22,.1);
  border: 1px solid rgba(249,115,22,.25);
  color: var(--accent);
  border-radius: 6px;
  font-size: 0.78rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: background .15s;
}
.watch-btn:hover { background: rgba(249,115,22,.22); }
.ch-card.playing .watch-btn {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

/* empty state */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  grid-column: 1/-1;
}
.empty-icon { font-size: 2.5rem; margin-bottom: 10px; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 900px) {
  .layout { grid-template-columns: 200px 1fr; }
}
@media (max-width: 640px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar {
    position: static;
    height: auto;
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
    gap: 0;
  }
  .sidebar-section { display: flex; align-items: center; margin: 0; }
  .sidebar-label { display: none; }
  .divider { width: 1px; height: 28px; margin: 0 4px; background: var(--border); }
  .sb-btn { white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; padding: 6px 14px; }
  .sb-btn.active { border-left-color: transparent; border-bottom-color: var(--accent); }
  .main { padding: 14px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 9px; }
  .logo { font-size: 0.9rem; }
  header { padding: 0 14px; }
  .search-wrap { max-width: 200px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="tv">TV</span><span class="dot">·</span><span class="mn">Munna</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search channels…">
  </div>
  <div class="live-indicator">
    <span class="live-dot"></span> LIVE TV
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- MAIN -->
  <main class="main">

    <!-- PLAYER -->
    <div class="player-box">
      <div class="player-top">
        <div class="now-info">
          <span class="live-tag">LIVE</span>
          <div>
            <div class="now-name" id="nowName">Select a channel</div>
            <div class="now-sub"  id="nowSub">TV with Munna — Watch the World</div>
          </div>
        </div>
        <div class="player-btns">
          <div class="quality-wrap">
            <button class="p-btn" id="qualityBtn" onclick="toggleQualityMenu(event)">📶 Auto</button>
            <div class="quality-menu" id="qualityMenu"></div>
          </div>
          <button class="p-btn" onclick="doFullscreen()">⛶ Fullscreen</button>
          <button class="p-btn" id="copyBtn" onclick="doCopy()">🔗 Copy URL</button>
          <button class="p-btn" onclick="doNewTab()">↗ Open Tab</button>
        </div>
      </div>
      <div class="video-area">
        <video id="player" controls playsinline></video>

        <!-- placeholder -->
        <div class="placeholder" id="placeholder">
          <div class="ph-tv">📺</div>
          <div class="ph-title">TV with Munna</div>
          <div class="ph-sub">Select any channel from below<br>to start watching live TV</div>
        </div>

        <!-- error -->
        <div class="err-overlay" id="errOverlay">
          <div class="err-icon">⚠️</div>
          <div class="err-text">This stream is unavailable right now.<br>Try another channel or open directly.</div>
          <div class="err-btns">
            <button class="err-btn primary"   onclick="retryPlay()">↺ Retry</button>
            <button class="err-btn secondary" onclick="doNewTab()">↗ Open in Browser</button>
          </div>
        </div>
      </div>
    </div>

    <!-- CHANNEL GRID -->
    <div class="section-header">
      <div class="section-title" id="sectionTitle">All Channels</div>
      <div class="ch-count"     id="chCount"></div>
    </div>
    <div class="grid" id="grid"></div>

  </main>
</div>

// ════════════════════════════════════════════════
//  CATEGORY CONFIG
// ════════════════════════════════════════════════
const CAT_STYLE = {
  News:          { cls:'tag-news',    icon:'📰' },
  Sports:        { cls:'tag-sports',  icon:'⚽' },
  Entertainment: { cls:'tag-ent',     icon:'🎬' },
  Kids:          { cls:'tag-kids',    icon:'🧸' },
  Science:       { cls:'tag-sci',     icon:'🔭' },
  Music:         { cls:'tag-music',   icon:'🎵' },
  General:       { cls:'tag-general', icon:'📺' },
  Weather:       { cls:'tag-weather', icon:'🌤️' },
  Religious:     { cls:'tag-relig',   icon:'🕌' },
};

const ALL_CATS = [...new Set(CHANNELS.flatMap(c => c.cats))].sort();
const ALL_COUNTRIES = [...new Set(CHANNELS.map(c => c.country))].sort();

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let filterMode    = 'all';   // 'all' | 'cat' | 'country'
let filterValue   = '';
let activeId      = null;
let currentUrl    = '';
let hlsInst       = null;

// ════════════════════════════════════════════════
//  SIDEBAR
// ════════════════════════════════════════════════
function buildSidebar() {
  const sb = document.getElementById('sidebar');

  const makeBtn = (mode, val, icon, label, count) => {
    const active = (filterMode === mode && filterValue === val) ||
                   (mode === 'all' && filterMode === 'all');
    return `<button class="sb-btn ${active?'active':''}"
      onclick="setFilter('${mode}','${val}')">
      <span class="sb-icon">${icon}</span>
      <span>${label}</span>
      <span class="sb-count">${count}</span>
    </button>`;
  };

  let html = `
    <div class="sidebar-section">
      <div class="sidebar-label">Browse</div>
      ${makeBtn('all','','🌍','All Channels', CHANNELS.length)}
    </div>
    <div class="divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Category</div>
      ${ALL_CATS.map(cat => {
        const cfg = CAT_STYLE[cat] || { icon:'📺' };
        const cnt = CHANNELS.filter(c => c.cats.includes(cat)).length;
        return makeBtn('cat', cat, cfg.icon, cat, cnt);
      }).join('')}
    </div>
    <div class="divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Country</div>
      ${ALL_COUNTRIES.map(country => {
        const ch = CHANNELS.find(c => c.country === country);
        const cnt = CHANNELS.filter(c => c.country === country).length;
        return makeBtn('country', country, ch ? ch.flag : '🌐', country, cnt);
      }).join('')}
    </div>`;

  sb.innerHTML = html;
}

function setFilter(mode, val) {
  filterMode  = mode;
  filterValue = val;
  document.getElementById('searchInput').value = '';
  buildSidebar();
  renderGrid();
}

// ════════════════════════════════════════════════
//  GRID
// ════════════════════════════════════════════════
function getFiltered(q = '') {
  let list = CHANNELS;
  if (filterMode === 'cat')     list = list.filter(c => c.cats.includes(filterValue));
  if (filterMode === 'country') list = list.filter(c => c.country === filterValue);
  if (q) list = list.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase()) ||
    c.country.toLowerCase().includes(q.toLowerCase()) ||
    c.cats.some(cat => cat.toLowerCase().includes(q.toLowerCase()))
  );
  return list;
}

function tagHtml(cats) {
  return cats.map(cat => {
    const cfg = CAT_STYLE[cat] || { cls:'tag-general' };
    return `<span class="ch-tag ${cfg.cls}">${cat}</span>`;
  }).join('');
}

function renderGrid(q = '') {
  const list = getFiltered(q);
  const grid = document.getElementById('grid');
  const title = document.getElementById('sectionTitle');
  const count = document.getElementById('chCount');

  // title
  if (filterMode === 'all')     title.textContent = '🌍 All Channels';
  else if (filterMode === 'cat') {
    const cfg = CAT_STYLE[filterValue] || { icon:'📺' };
    title.textContent = `${cfg.icon} ${filterValue}`;
  } else {
    const ch = CHANNELS.find(c => c.country === filterValue);
    title.textContent = `${ch ? ch.flag : '🌐'} ${filterValue}`;
  }
  count.textContent = `${list.length} channel${list.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>No channels found.</div>`;
    return;
  }

  grid.innerHTML = list.map(ch => `
    <div class="ch-card ${activeId === ch.id ? 'playing' : ''}" onclick="play('${ch.id}')">
      <div class="ch-head">
        <span class="ch-flag">${ch.flag}</span>
        <span class="ch-live-dot" title="Live"></span>
      </div>
      <div class="ch-name">${ch.name}</div>
      <div class="ch-tags">${tagHtml(ch.cats)}</div>
      <button class="watch-btn">${activeId === ch.id ? '▐▌ Now Playing' : '▶ Watch Live'}</button>
    </div>
  `).join('');
}

// ════════════════════════════════════════════════
//  PLAYER
// ════════════════════════════════════════════════
function play(id) {
  const ch = CHANNELS.find(c => c.id === id);
  if (!ch) return;
  activeId   = id;
  currentUrl = ch.url;

  document.getElementById('nowName').textContent = ch.flag + '  ' + ch.name;
  document.getElementById('nowSub').textContent  = ch.country + ' · ' + ch.cats.join(', ');
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('errOverlay').classList.remove('show');

  // reset quality UI
  resetQualityMenu();
  renderGrid(document.getElementById('searchInput').value);

  const video = document.getElementById('player');
  if (hlsInst) { hlsInst.destroy(); hlsInst = null; }

  if (typeof Hls === 'undefined') { showErr(); return; }

  if (Hls.isSupported()) {
    hlsInst = new Hls({ enableWorker: true, lowLatencyMode: true });
    hlsInst.loadSource(ch.url);
    hlsInst.attachMedia(video);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(()=>{});
      buildQualityMenu();
    });
    hlsInst.on(Hls.Events.LEVEL_SWITCHED, () => updateQualityBtn());
    hlsInst.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) showErr(); });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = ch.url;
    video.play().catch(() => showErr());
  } else {
    showErr();
  }
}

// ── Quality Menu ──
function resetQualityMenu() {
  document.getElementById('qualityBtn').textContent = '📶 Auto';
  document.getElementById('qualityMenu').innerHTML  = '';
  document.getElementById('qualityMenu').classList.remove('open');
}

function buildQualityMenu() {
  if (!hlsInst) return;
  const levels = hlsInst.levels;
  if (!levels || levels.length <= 1) {
    // single quality — show only Auto
    document.getElementById('qualityMenu').innerHTML =
      `<div class="q-item active">📶 Auto <span class="q-badge">Only</span></div>`;
    return;
  }

  // build items: Auto + each level
  let html = `<div class="q-item active" onclick="setQuality(-1)">📶 Auto <span class="q-badge">ABR</span></div>
    <div class="q-divider"></div>`;

  // sort highest first
  const sorted = levels.map((l, i) => ({ i, h: l.height || 0, bw: l.bitrate || 0 }))
    .sort((a, b) => b.h - a.h);

  sorted.forEach(({ i, h, bw }) => {
    const label = h ? `${h}p` : `Level ${i+1}`;
    const badge = bw ? `${Math.round(bw/1000)}k` : '';
    const quality = h >= 720 ? '🔵 HD' : h >= 480 ? '🟡 SD' : h ? '🔴 LQ' : '⚪';
    html += `<div class="q-item" onclick="setQuality(${i})">${quality} ${label} <span class="q-badge">${badge}</span></div>`;
  });

  document.getElementById('qualityMenu').innerHTML = html;
}

function setQuality(level) {
  if (!hlsInst) return;
  hlsInst.currentLevel = level; // -1 = auto
  updateQualityBtn();
  document.getElementById('qualityMenu').classList.remove('open');
  // update active class
  document.querySelectorAll('#qualityMenu .q-item').forEach((el, i) => {
    el.classList.toggle('active', i === (level === -1 ? 0 : level + 1));
  });
}

function updateQualityBtn() {
  if (!hlsInst) return;
  const btn = document.getElementById('qualityBtn');
  const lvl = hlsInst.currentLevel;
  if (lvl === -1 || !hlsInst.levels[lvl]) {
    btn.textContent = '📶 Auto';
  } else {
    const h = hlsInst.levels[lvl].height;
    btn.textContent = h ? `📶 ${h}p` : '📶 Manual';
  }
}

function toggleQualityMenu(e) {
  e.stopPropagation();
  document.getElementById('qualityMenu').classList.toggle('open');
}

// close menu on outside click
document.addEventListener('click', () => {
  document.getElementById('qualityMenu').classList.remove('open');
});

function showErr() {
  document.getElementById('errOverlay').classList.add('show');
}
function retryPlay() {
  document.getElementById('errOverlay').classList.remove('show');
  if (activeId) play(activeId);
}
function doFullscreen() {
  const v = document.getElementById('player');
  if (document.fullscreenElement) document.exitFullscreen();
  else v.requestFullscreen().catch(()=>{});
}
function doCopy() {
  if (!currentUrl) return;
  navigator.clipboard.writeText(currentUrl).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '🔗 Copy URL', 2000);
  });
}
function doNewTab() {
  if (currentUrl) window.open(currentUrl, '_blank');
}

// ════════════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.trim();
  if (q) { filterMode = 'all'; filterValue = ''; buildSidebar(); }
  renderGrid(q);
});

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
buildSidebar();
